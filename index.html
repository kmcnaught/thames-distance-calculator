<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b3a5c" />
  <title>Thalweg — on-river distance, Thames</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div id="map" aria-label="Thames map"></div>

  <header id="brand" aria-hidden="false">
    <span class="brand-mark">Thalweg</span>
    <span class="brand-sub">on-river distance · Thames</span>
  </header>

  <section id="panel" class="expanded" aria-live="polite">
    <button id="panel-toggle" class="panel-toggle" aria-label="Collapse panel">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="panel-body">
      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="measure" role="tab" aria-selected="true">Measure</button>
        <button class="tab" data-tab="find" role="tab" aria-selected="false">Find trips</button>
      </nav>

      <section id="tab-measure" class="tab-panel active" role="tabpanel">
        <p id="hint" class="hint">Tap the map to drop pin A.</p>

        <div id="readout" class="readout" hidden>
          <div class="distance">
            <span id="dist-km" class="dist-km">—</span>
            <span class="dist-unit">km on the river</span>
          </div>
          <div class="distance-secondary">
            <span id="dist-mi">— mi</span>
            <span class="sep">·</span>
            <span id="dist-straight">— km straight</span>
            <span class="sep">·</span>
            <span id="sinuosity">sinuosity —</span>
          </div>
          <p id="offset-warn" class="warn" hidden></p>
        </div>

        <div class="next-slot">
          <span>Next pin:</span>
          <span id="next-slot-label" class="pin-chip pin-a">A</span>
        </div>

        <div class="actions">
          <button id="btn-swap" class="btn" disabled>Swap A ↔ B</button>
          <button id="btn-clear" class="btn" disabled>Clear</button>
          <button id="btn-share" class="btn btn-primary" disabled>Share link</button>
        </div>
      </section>

      <section id="tab-find" class="tab-panel" role="tabpanel" hidden>
        <div class="field">
          <label class="field-label">
            Trip distance
            <output id="find-dist-out" class="field-value">8 mi ± 1.5 mi</output>
          </label>
          <div class="dual-range">
            <input id="find-target" type="range" min="3" max="25" step="0.5" value="8" />
            <input id="find-tol"    type="range" min="0" max="5"  step="0.5" value="1.5" />
          </div>
        </div>

        <div class="field">
          <label class="field-label">
            Campsite within
            <output id="find-walk-out" class="field-value">1.0 km</output>
          </label>
          <input id="find-walk" type="range" min="0" max="3" step="0.25" value="1" />
          <label class="check"><input id="find-need-camp" type="checkbox" checked /> Require campsite near take-out</label>
        </div>

        <div class="field">
          <label class="check"><input id="find-need-park" type="checkbox" /> Require parking at put-in</label>
        </div>

        <div class="actions">
          <button id="btn-find" class="btn btn-primary">Find trips</button>
        </div>

        <p id="find-summary" class="hint">Adjust filters and press Find.</p>
        <ol id="find-results" class="results" aria-live="polite"></ol>
      </section>
    </div>

    <footer class="attr">
      © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors (ODbL)
    </footer>
  </section>

  <div id="toast" class="toast" hidden></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
